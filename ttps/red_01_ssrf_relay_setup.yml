- name: 'DESERT WIRE: Setup M1 sigint-relay SSRF Vulnerable Node.js App'
  description: >-
    Installs Node.js and deploys the DESERT WIRE SIGINT Comms Relay Dashboard
    on M1 (sigint-relay). The app contains an SSRF vulnerability in the
    POST /api/uplink/check endpoint. The server fetches any URL provided,
    allowing attackers to reach internal DMZ hosts (M2) and retrieve
    bootstrap credentials from the internal /api/internal/status endpoint.
    Runs on port 80 via authbind. Generates access logs in /var/log/desertrelay.log.
    Run this TTP on the M1 machine before the exercise begins.
  tactic: resource-development
  technique_id: T1608.001
  technique_name: 'Stage Capabilities: Upload Malware'
  singleton: true
  repeatable: false
  delete_payload: false
  executors:
  - name: sh
    platform: linux
    command: >-
      echo "[RED] Setting up M1 sigint-relay SSRF app";
      id sigint 2>/dev/null || useradd -r -s /bin/false -d /opt/sigint sigint;
      touch /etc/authbind/byport/80;
      chown sigint:sigint /etc/authbind/byport/80;
      chmod 755 /etc/authbind/byport/80;
      mkdir -p /opt/sigint/relay /opt/sigint/classified;
      FLAG="FLAG{ssrf_relay_breach_achieved}";
      echo "$FLAG" > /opt/sigint/classified/flag1.txt;
      chmod 640 /opt/sigint/classified/flag1.txt;
      chown sigint:sigint /opt/sigint/classified/flag1.txt;
      chmod 701 /opt/sigint/classified;
      touch /var/log/desertrelay.log;
      chown sigint:sigint /var/log/desertrelay.log && chmod 644 /var/log/desertrelay.log;
      echo "[RED] M1 skeleton deployed. Run full setup.sh for complete app deployment.";
      echo "[RED] Flag: $FLAG"
    code: null
    language: null
    build_target: null
    payloads: []
    uploads: []
    timeout: 180
    parsers: []
    cleanup: []
    variations: []
    additional_info: {}
  requirements: []
  id: dw01a2b3c4d5e6f7a8b9c0d1e2f3a4b5
